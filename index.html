<body>
<!-- Loading screen (standalone, not inside #app) -->
<div id="loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f5f7">
  <div style="text-align:center"><div style="width:44px;height:44px;border-radius:10px;background:#0f1729;display:flex;align-items:center;justify-content:center;color:#d4a843;font-weight:800;font-size:16px;margin:0 auto 10px">50</div><p style="color:#94a3b8;font-size:12px">Loading playoff stats...</p></div>
</div>
<div id="app" style="display:none"></div>

<script>
// ============================================================
// SEASONS
// ============================================================
const SEASONS={
  2025:{id:'20242025',fee:50,sheetUrl:'',mult:{CAR:1.5,COL:1.5,DAL:1.5,EDM:1.5,FLA:1.5,LAK:1.5,NJD:1.5,TBL:1.5,TOR:1.0,WSH:1.0,WPG:1.0,VGK:1.0,MTL:2.0,OTT:2.0,MIN:2.0,STL:2.0,PHI:1.5,BOS:1.5,NYR:1.5,NYI:1.5},alive:['CAR','DAL','EDM','FLA','LAK','PHI','TBL','TOR','WSH','VGK','WPG']},
  2026:{id:'20252026',fee:50,sheetUrl:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRB40X80kl-o3umS5nTtxa0ln4mYxj8u4PXdXdBTIIQ0fSOL5EtIIMzxZkSp_VDYnADhyIoMPxgaloK/pub?output=csv',mult:{CAR:1.0,BUF:1.0,COL:1.0,VEG:1.0,TBL:1.5,MTL:1.5,PIT:1.5,PHI:1.5,DAL:1.5,MIN:1.5,EDM:1.5,ANA:1.5,BOS:2.0,OTT:2.0,UTA:2.0,LAK:2.0},alive:['CAR','BUF','COL','VEG','TBL','MTL','PIT','PHI','DAL','MIN','EDM','ANA','BOS','OTT','UTA','LAK']},
};
const CFG={title:'50 Pucks',pk:50,minPk:1,maxPk:6,fwd:10,def:5,cur:'CAD',pay:[{p:1,l:'1st',r:.6},{p:2,l:'2nd',r:.3},{p:3,l:'3rd',r:.1}]};
const TM={ANA:'#F47A38',BOS:'#FFB81C',BUF:'#003087',CGY:'#D2001C',CAR:'#CC0000',CHI:'#CF0A2C',COL:'#6F263D',CBJ:'#002654',DAL:'#006847',DET:'#CE1126',EDM:'#FF4C00',FLA:'#C8102E',LAK:'#A2AAAD',MIN:'#154734',MTL:'#AF1E2D',NSH:'#FFB81C',NJD:'#CE1126',NYI:'#00539B',NYR:'#0038A8',OTT:'#C52032',PHI:'#F74902',PIT:'#FCB514',SJS:'#006D75',SEA:'#001628',STL:'#002F87',TBL:'#002868',TOR:'#00205B',UTA:'#71AFE5',VAN:'#00205B',VGK:'#B4975A',WSH:'#041E42',WPG:'#041E42'};
const AM={VEG:'VGK',WAS:'WSH',TB:'TBL',NJ:'NJD',SJ:'SJS',LA:'LAK',CLB:'CBJ'};

// All NHL teams (full roster for stats display)
const ALL_TEAMS=['ANA','BOS','BUF','CGY','CAR','CHI','COL','CBJ','DAL','DET','EDM','FLA','LAK','MIN','MTL','NSH','NJD','NYI','NYR','OTT','PHI','PIT','SJS','SEA','STL','TBL','TOR','UTA','VAN','VGK','WSH','WPG'];

function nm(a){if(!a)return'';const u=a.toUpperCase().trim();return AM[u]||u;}
function sn(){return SEASONS[S.yr]||SEASONS[2025];}
function mt(t){return sn().mult[nm(t)]??1.0;}
function al(t){return sn().alive.includes(nm(t));}

// Build player lists by PPG: top 6 forwards and top 4 defensemen per team
function buildPlayerListByPPG(stats){
  const byTeam={};for(const p of stats){if(!byTeam[p.team])byTeam[p.team]={F:[],D:[]};if(p.pos==='D')byTeam[p.team].D.push(p);else byTeam[p.team].F.push(p);}
  const result={};for(const team in byTeam){const fwd=byTeam[team].F.sort((a,b)=>(b.gp>0?b.pts/b.gp:0)-(a.gp>0?a.pts/a.gp:0)).slice(0,6);const def=byTeam[team].D.sort((a,b)=>(b.gp>0?b.pts/b.gp:0)-(a.gp>0?a.pts/a.gp:0)).slice(0,4);result[team]=[...fwd,...def];}
  return result;
}
// Get teams that are alive (not mathematically eliminated)
function getAliveTeams(){
  const season=sn();
  return season.alive.length>0?season.alive:ALL_TEAMS;
}

// ============================================================
// CSV PARSING - Hockey-Reference Format
// ============================================================
let rostersData=null; // Locked roster from uploaded CSV
let playoffStats=null; // Live playoff stats from API

// Load persisted data on init
function loadPersistedRoster(){
  try{
    const saved=localStorage.getItem('50pucks_roster');
    if(saved){
      rostersData=JSON.parse(saved);
      console.log('✓ Loaded persisted roster:',rostersData.length,'players');
    }
  }catch(e){
    console.error('Error loading persisted roster:',e);
  }
}

function loadPersistedEntries(){
  try{
    const saved=localStorage.getItem('50pucks_entries_2026');
    if(saved){
      const parsed=JSON.parse(saved);
      if(parsed&&parsed.length>0){
        S.entries=parsed;
        console.log('✓ Loaded persisted entries:',parsed.length,'teams');
        return true;
      }
    }
  }catch(e){
    console.error('Error loading persisted entries:',e);
  }
  return false;
}

function loadPersistedStats(){

function parseRosterCSV(csv){
  // Parse Hockey-Reference CSV with multi-team player handling
  // For multi-team players, uses LAST team occurrence (post-trade team)
  
  const lines=csv.trim().split('\n');
  const players=new Map(); // Track all occurrences - last one wins
  
  let i=0;
  // Skip header comments
  while(i<lines.length&&!lines[i].includes('Rk,Player')){i++;}
  i++; // Skip header line
  
  while(i<lines.length){
    const line=lines[i].trim();
    if(!line||line.startsWith('League Average'))break;
    
    const cols=line.split(',').map(c=>c.trim());
    if(cols.length<10)continue;
    
    const rk=cols[0];
    const name=cols[1];
    const team=cols[3];
    const pos=cols[4];
    const gp=parseInt(cols[5])||0;
    const g=parseInt(cols[6])||0;
    const a=parseInt(cols[7])||0;
    const pts=parseInt(cols[8])||0;
    
    // Skip goalie and non-skaters
    if(pos==='G'||!name||name==='Player')continue;
    
    // Skip 2TM/3TM rows (totals) - we'll use individual team rows instead
    if(team.match(/^\d+TM$/)){
      i++;
      continue;
    }
    
    // Process individual team rows
    if(team.match(/^[A-Z]{2,3}$/)){
      const key=name.toLowerCase();
      // For multi-team players, this overwrites with the latest (last) team
      players.set(key,{
        name,
        team:nm(team),
        pos:pos[0]||'F',
        gp,g,a,pts,
        _src:'Roster Lock'
      });
    }
    i++;
  }
  
  const roster=Array.from(players.values());
  return roster.length>0?roster:null;
}


function validateHockeyRefCSV(csv,players){
  const issues=[];
  
  // Check player count
  if(players.length<DATA_VALIDATION.minPlayers){
    issues.push(`❌ Only ${players.length} players (need ≥${DATA_VALIDATION.minPlayers})`);
  }
  
  // Check for invalid teams
  const invalidTeams=new Set();
  for(const p of players){
    if(!DATA_VALIDATION.validTeams.includes(p.team)){
      invalidTeams.add(p.team);
    }
  }
  if(invalidTeams.size>0){
    issues.push(`❌ Invalid teams: ${Array.from(invalidTeams).join(', ')}`);
  }
  
  // Check team roster sizes
  const teamCounts={};
  for(const p of players){
    teamCounts[p.team]=(teamCounts[p.team]||0)+1;
  }
  const oversizedTeams=Object.entries(teamCounts).filter(([t,c])=>c>DATA_VALIDATION.maxPlayersPerTeam);
  if(oversizedTeams.length>0){
    issues.push(`❌ Teams with too many players: ${oversizedTeams.map(([t,c])=>`${t}(${c})`).join(', ')}`);
  }
  
  // Check top scorer
  const topScorer=players[0];
  if(!topScorer || topScorer.pts<DATA_VALIDATION.minPointsLeader){
    issues.push(`❌ Top scorer has only ${topScorer?.pts||0} points (need ≥${DATA_VALIDATION.minPointsLeader})`);
  }
  
  // Check for duplicate names
  const names=new Map();
  const dups=[];
  for(const p of players){
    if(names.has(p.name)){dups.push(p.name);}
    names.set(p.name,true);
  }
  if(dups.length>0){
    issues.push(`⚠️ ${dups.length} duplicate names (may be multi-team players)`);
  }
  
  // Check for missing critical stats
  const missingStats=players.filter(p=>!p.gp||p.gp<1||!p.pts).length;
  if(missingStats>0){
    issues.push(`⚠️ ${missingStats} players missing games played or points`);
  }
  
  return {valid:issues.length===0,issues,warnings:issues.filter(i=>i.startsWith('⚠️')),errors:issues.filter(i=>i.startsWith('❌'))};
}

async function fetchPlayoffStats(){
  // Fetch live playoff stats from NHL API (game_type=3)
  try{
    const r=await fetch('https://api-web.nhle.com/v1/skater-stats-leaders/20252026/3?categories=points,goals,assists&limit=-1');
    if(r.ok){
      const d=await r.json();
      const stats=new Map();
      const processCategory=(list,category)=>{
        if(!list)return;
        for(const p of list){
          const id=p.id;
          if(!stats.has(id))stats.set(id,{
            id,
            name:`${p.firstName?.default||''} ${p.lastName?.default||''}`.trim(),
            team:nm(p.teamAbbrev?.default||''),
            pts:0,g:0,a:0,_s:'NHL Playoff API'
          });
          const entry=stats.get(id);
          if(category==='points')entry.pts=p.value||0;
          if(category==='goals')entry.g=p.value||0;
          if(category==='assists')entry.a=p.value||0;
        }
      };
      processCategory(d.points,'points');
      processCategory(d.goals,'goals');
      processCategory(d.assists,'assists');

      playoffStats=[...stats.values()];
      return true;
    }
  }catch(e){
    console.error('Playoff fetch error:',e);
  }
  return false;
}

async function fetchEntriesFromSheet(){
  // Fetch the published CSV URL directly — Google CDN has proper CORS headers, no GAS needed for reads
  const sheetUrl=sn().sheetUrl;
  if(!sheetUrl){alert('❌ No sheet URL configured');return false;}

  try{
    const r=await fetch(sheetUrl);
    if(!r.ok){alert(`❌ Sheet fetch failed (HTTP ${r.status})`);return false;}

    const csv=await r.text();
    const entries=parseEntriesCSV(csv);

    // Always wipe local cache — sheet is authoritative
    localStorage.removeItem('50pucks_entries_2026');

    if(entries.length>0){
      S.entries=entries;
      saveEntries();
      if(S._nhlStats&&S._nhlStats.length>0){
        const lu=buildLU(S._nhlStats);
        const sc=calcScores(entries,lu);
        const ps=poolStats(sc);
        S.entries=sc;S.stats=ps;S.sel=sc[0]?.teamName||null;
      }else{
        S.stats=null;S.sel=entries[0]?.teamName||null;
      }
      alert(`✓ Loaded ${entries.length} entries from sheet`);
    }else{
      S.entries=[];S.stats=null;S.sel=null;
      alert('ℹ Sheet loaded — no entries yet.');
    }
    render();
    return entries.length>0;
  }catch(err){
    console.error('Sheet fetch error:',err);
    alert(`❌ Failed to fetch sheet: ${err.message}`);
  }
  return false;
}

function parseEntriesCSV(csv){
  // Parse Google Sheet CSV: team_name,owner_name,player_name,player_team,position,pucks[,timestamp]
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];

  // Find header row — look for 'team_name' in first 5 lines, otherwise assume row 0 is header
  let headerIdx=0;
  for(let j=0;j<Math.min(lines.length,5);j++){
    if(lines[j].toLowerCase().includes('team_name')){headerIdx=j;break;}
  }

  const entries=new Map();
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue; // skip blank lines, don't stop

    const cols=csvL(line); // use proper quoted-CSV parser
    if(cols.length<6)continue;

    const teamName=cols[0].trim();
    const owner=cols[1].trim();
    const playerName=cols[2].trim();
    const playerTeam=cols[3].trim();
    const position=cols[4].trim();
    const pucks=parseInt(cols[5])||1;

    if(!teamName||!playerName)continue;

    if(!entries.has(teamName)){
      entries.set(teamName,{teamName,owner,players:[],total:0,rank:0});
    }
    const entry=entries.get(teamName);
    entry.players.push({name:playerName,team:playerTeam,position,pucks});
    entry.total+=pucks;
  }

  return Array.from(entries.values());
}

function calcScores(entries,lu){
  const sc=entries.map(e=>{let tot=0,alv=0,pkR=0,bn=null,wn=null,bs=-1e9,ws=1e9;
    const pl=e.players.map(p=>{const s=mp(p.name,lu);const pts=s?.pts||0,g=s?.g||0,a=s?.a||0,gp=s?.gp||0,m=mt(p.team),ia=al(p.team),sc=pts*m*p.pucks;if(ia){alv++;pkR+=p.pucks;}tot+=sc;if(sc>bs){bs=sc;bn=p.name;}if(sc<ws){ws=sc;wn=p.name;}return{...p,pts,g,a,gp,mult:m,score:Math.round(sc*10)/10,alive:ia,matched:!!s};});
    const fw=pl.filter(p=>p.position==='F').sort((a,b)=>b.score-a.score),df=pl.filter(p=>p.position==='D').sort((a,b)=>b.score-a.score);
    return{...e,players:[...fw,...df],total:Math.round(tot*10)/10,alive:alv,cnt:pl.length,pkR,pkU:pl.reduce((s,p)=>s+p.pucks,0),bp:bn,bs:Math.round(bs*10)/10,wp:wn,ws:Math.round(ws*10)/10};});
  sc.sort((a,b)=>b.total-a.total);let r=1;for(let i=0;i<sc.length;i++){if(i>0&&sc[i].total<sc[i-1].total)r=i+1;sc[i].rank=r;}return sc;
}
function poolStats(en){
  const pop=new Map();let totalPucks=0,deadPucks=0;
  for(const e of en)for(const p of e.players){
    totalPucks+=p.pucks;if(!p.alive)deadPucks+=p.pucks;
    if(!pop.has(p.name))pop.set(p.name,{c:0,tp:0,sc:[],pos:p.position,team:p.team,pts:p.pts,gp:p.gp,alive:p.alive});
    const o=pop.get(p.name);o.c++;o.tp+=p.pucks;o.sc.push(p.score);if(p.pts>o.pts){o.pts=p.pts;o.gp=p.gp;o.alive=p.alive;}
  }
  const pl=[...pop.entries()].map(([n,d])=>({name:n,pos:d.pos,team:d.team,pts:d.pts,alive:d.alive,c:d.c,tp:d.tp,ap:Math.round(d.tp/d.c*10)/10,as:Math.round(d.sc.reduce((a,b)=>a+b,0)/d.c*10)/10,ms:Math.max(...d.sc),own:Math.round(d.c/en.length*100)})).sort((a,b)=>b.c-a.c||b.as-a.as);
  let gB=null,gW=null;for(const e of en)for(const p of e.players){if(!gB||p.score>gB.score)gB={...p,tn:e.teamName};if(!gW||p.score<gW.score)gW={...p,tn:e.teamName};}
  // Pool Concentration: % of total pucks on top 5 most-owned players
  const top5=pl.slice(0,5);const top5pucks=top5.reduce((s,p)=>s+p.tp,0);
  const concentration=totalPucks>0?Math.round(top5pucks/totalPucks*100):0;
  const top5names=top5.map(p=>p.name.split(' ').pop()).join(', ');
  // Dead Puck Rate: % of all pucks on eliminated players
  const deadRate=totalPucks>0?Math.round(deadPucks/totalPucks*100):0;
  return{n:en.length,pool:en.length*sn().fee,pl,gB,gW,avg:en.length?Math.round(en.reduce((s,e)=>s+e.total,0)/en.length):0,concentration,top5names,deadRate,deadPucks,totalPucks};
}

function runSim(en,c){const ns=c.n||1000,res=new Map();en.forEach(e=>res.set(e.teamName,[]));for(let s=0;s<ns;s++)for(const e of en){let t=0;for(const p of e.players)t+=simP(p,c)*p.mult*p.pucks;res.get(e.teamName).push(Math.round(t*10)/10);}const pr=en.map(e=>{const sm=res.get(e.teamName).sort((a,b)=>a-b);return{tn:e.teamName,cur:e.total,mn:Math.round(sm.reduce((a,b)=>a+b,0)/sm.length),md:Math.round(sm[~~(sm.length*.5)]),p10:Math.round(sm[~~(sm.length*.1)]),p90:Math.round(sm[~~(sm.length*.9)])};});const wn=new Map();en.forEach(e=>wn.set(e.teamName,0));for(let s=0;s<ns;s++){let b='',bv=-1e9;for(const[tn,sm]of res)if(sm[s]>bv){bv=sm[s];b=tn;}wn.set(b,(wn.get(b)||0)+1);}pr.forEach(p=>p.wp=Math.round(wn.get(p.tn)/ns*1000)/10);pr.sort((a,b)=>b.mn-a.mn);return pr;}
function simP(p,c){const cur=p.pts||0,gp=p.gp||0;if(!p.alive)return cur;const ppg=gp>0?cur/gp:.5;const adv=c.adv?.[p.mult]??.5;let rem=Math.max(0,Math.min(3,7-(gp%7)));for(let r=0;r<3;r++){if(Math.random()<adv)rem+=4+~~(Math.random()*4);else break;}let f=0;for(let g=0;g<rem;g++){f+=poi(Math.max(0,ppg+gau()*ppg*(c.v||.5)));}return cur+f;}
function gau(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function poi(l){if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

    <div class="stat-cell"><div class="stat-label"><span class="stat-dot" style="background:#58c89a"></span>Leader</div><div class="stat-value num">${fmt(leader?.total||0)}</div><div class="stat-sub">${esc(leader?.teamName||'')} · ${leader?ordinal(leader.rank):''}</div></div>
    <div class="stat-cell"><div class="stat-label"><span class="stat-dot" style="background:#7aa8ff"></span>Best Pick</div><div class="stat-value num">${fmt(s?.gB?.score||0)}</div><div class="stat-sub">${esc(s?.gB?.name||'')} · ${esc(s?.gB?.tn||'')}</div></div>
    <div class="stat-cell"><div class="stat-label"><span class="stat-dot" style="background:#b58bff"></span>Pool Concentration</div><div class="stat-value num">${s?.concentration||0}%</div><div class="stat-sub">Top 5 most-owned players</div></div>
    <div class="stat-cell"><div class="stat-label"><span class="stat-dot" style="background:#ef5b6f"></span>Dead Puck Rate</div><div class="stat-value num">${s?.deadRate||0}%</div><div class="stat-sub">${s?.deadPucks||0} of ${s?.totalPucks||0} pucks eliminated</div></div>
  </div>`;

    const isOpen=S.expandedTeam===en.teamName;

      <div onclick='toggleExpand(${jsq(en.teamName)})' class="lb-row2">

        <div class="hide-sm"><div class="metric-main num">${en.alive}<span style="color:#a8a29e;font-weight:500"> / ${en.cnt}</span></div><div class="metric-sub">Alive / Total</div></div>

        <div class="hide-sm"><div class="metric-main num" style="color:#58c89a">${fmt(en.bs)}</div><div class="metric-sub">${esc(en.bp||'')}</div></div>

function TD(){

  const opts=S.entries.map(x=>`<option value="${esc(x.teamName)}" ${x.teamName===e.teamName?'selected':''}>#${x.rank} ${esc(x.teamName)}</option>`).join('');
  const bar=e.players.map(p=>{const w=(p.pucks/50)*100;return`<div style="width:${w}%;background:${p.alive?(TM[p.team]||'#3b82f6'):'#e2e8f0'};opacity:${p.alive?1:.5}" title="${esc(p.name)}: ${p.pucks}"></div>`;}).join('');
  const sec=(t,pl)=>{const tot=pl.reduce((s,p)=>s+p.score,0);return`<div class="card"><div class="flex justify-between items-center px-3 py-1.5 bg-slate-50 border-b border-slate-200"><span class="text-[9px] font-semibold text-slate-400 uppercase tracking-wider">${t}</span><span class="text-[11px] text-slate-500 num">${fmt(Math.round(tot))}</span></div><div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="border-b border-slate-100"><th class="text-left text-[9px] text-slate-400 uppercase px-2 sm:px-3 py-1">Player</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">Tm</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">GP</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">G</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">A</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">PTS</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">×</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1">Pk</th><th class="text-right text-[9px] text-slate-400 uppercase px-2 sm:px-3 py-1">Score</th></tr></thead><tbody>${pl.map(p=>`<tr class="border-b border-slate-50 trow"><td class="px-2 sm:px-3 py-1.5"><div class="flex items-center gap-1"><span class="dot" style="background:${p.alive?'#10b981':'#e2e8f0'}"></span><span class="${p.alive?'text-slate-900':'text-slate-400'} text-[11px] sm:text-xs">${esc(p.name)}</span></div></td><td class="px-1 py-1.5 text-center">${tb(p.team)}</td><td class="px-1 py-1.5 text-center text-slate-500 num">${p.gp}</td><td class="px-1 py-1.5 text-center text-slate-500 num">${p.g}</td><td class="px-1 py-1.5 text-center text-slate-500 num">${p.a}</td><td class="px-1 py-1.5 text-center text-slate-900 font-semibold num">${p.pts}</td><td class="px-1 py-1.5 text-center font-semibold ${p.mult===2?'text-amber-500':p.mult===1.5?'text-blue-500':'text-slate-400'}">${p.mult}x</td><td class="px-1 py-1.5 text-center">${pkD(p.pucks,p.alive)}</td><td class="px-2 sm:px-3 py-1.5 text-right font-bold text-slate-900 num">${fmt(p.score)}</td></tr>`).join('')}</tbody></table></div></div>`;};
  return`<div class="space-y-3">
    <select onchange="set({sel:this.value})" class="ghost-select sm:!w-auto">${opts}</select>
    <div class="card p-3 sm:p-4">
      <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
        <div><div class="text-sm sm:text-base font-bold text-slate-900">${esc(e.teamName)}</div><div class="text-slate-400 text-[11px]">${esc(e.owner)}</div></div>
        <div class="flex gap-4 text-center">
          <div><div class="text-lg font-bold text-slate-900 num">${fmt(e.total)}</div><div class="text-[9px] text-slate-400 uppercase">Score</div></div>
          <div><div class="text-lg font-bold ${ac(e.alive,e.cnt)} num">${e.alive}/${e.cnt}</div><div class="text-[9px] text-slate-400 uppercase">Alive</div></div>
          <div><div class="text-lg font-bold ${pc(e.pkR,50)} num">${e.pkR}</div><div class="text-[9px] text-slate-400 uppercase">Pucks Left</div></div>

    </div>
    ${sec('Forwards',e.players.filter(p=>p.position==='F'))}
    ${sec('Defense',e.players.filter(p=>p.position==='D'))}
  </div>`;
}

function CP(){
  const entries=S.entries||[]; if(entries.length<2)return '<div class="card p-4 text-sm text-slate-600">Load at least two entries to compare.</div>';
  if(!S.cmpA||!entries.some(x=>x.teamName===S.cmpA))S.cmpA=entries[0].teamName;
  if(!S.cmpB||!entries.some(x=>x.teamName===S.cmpB)||S.cmpB===S.cmpA)S.cmpB=entries[1]?.teamName||entries[0].teamName;
  const A=entries.find(x=>x.teamName===S.cmpA)||entries[0];
  const B=entries.find(x=>x.teamName===S.cmpB)||entries[1]||entries[0];
  const opts=sel=>entries.map(x=>`<option value="${esc(x.teamName)}" ${x.teamName===sel?'selected':''}>#${x.rank} — ${esc(x.teamName)}</option>`).join('');
  const card=(E,side)=>`<div class="compare-card">
    <select onchange="set({${side}:this.value})" class="ghost-select">${opts(E.teamName)}</select>
    <div class="mt-4">
      <div class="text-4xl font-bold tracking-tight" style="font-family:Georgia,serif;color:#14213d">${esc(E.teamName)}</div>
      <div class="text-sm text-slate-500 mt-1">${esc(E.owner||'')}</div>
      <div class="text-5xl num mt-4 text-slate-900">${fmt(E.total)}</div>
      <div class="mt-2 text-sm text-slate-500">#${E.rank} · ${E.alive}/${E.cnt} alive · ${E.pkR} pucks left</div>
    </div>
  </div>`;
  const rows=[
    compareMetricRow('Total Score',A.total,B.total),
    compareMetricRow('Overall Rank',A.rank,B.rank,{fmtFn:v=>'#'+v,higherBetter:false}),
    compareMetricRow('Alive Skaters',A.alive,B.alive,{fmtFn:(v)=>String(v)}),
    compareMetricRow('Pucks Alive',A.pkR,B.pkR,{fmtFn:(v)=>String(v)}),
    compareMetricRow('Best Pick Score',A.bs,B.bs),
    compareMetricRow('Pts per Puck',A.pkU?A.total/A.pkU:0,B.pkU?B.total/B.pkU:0),
  ].join('');
  const namesA=new Set(A.players.map(p=>p.name));
  const namesB=new Set(B.players.map(p=>p.name));
  const shared=A.players.filter(p=>namesB.has(p.name)).map(p=>p.name).sort();
  const uniqA=A.players.filter(p=>!namesB.has(p.name)).map(p=>p.name).sort();
  const uniqB=B.players.filter(p=>!namesA.has(p.name)).map(p=>p.name).sort();
  return `<div><div class="flex items-start justify-between gap-4 mb-4"><div><div class="text-[12px] uppercase tracking-[0.18em] text-[#58c89a] mb-1">§03</div><h2 class="text-3xl font-bold" style="font-family:Georgia,serif;color:#14213d">Compare Entries</h2></div><div class="text-sm text-slate-500 text-right">Head-to-head breakdown. Stronger value on each metric is highlighted.</div></div><div class="compare-shell">${card(A,'cmpA')}<div class="compare-vs">vs</div>${card(B,'cmpB')}</div><div class="compare-metrics">${rows}<div class="grid md:grid-cols-3 gap-5 mt-6 text-sm"><div><div class="compare-label text-left mb-2">Shared Players</div><div class="text-slate-700">${shared.length?shared.map(esc).join(', '):'None'}</div></div><div><div class="compare-label text-left mb-2">${esc(A.teamName)} Only</div><div class="text-slate-700">${uniqA.length?uniqA.map(esc).join(', '):'None'}</div></div><div><div class="compare-label text-left mb-2">${esc(B.teamName)} Only</div><div class="text-slate-700">${uniqB.length?uniqB.map(esc).join(', '):'None'}</div></div></div></div></div>`;
}

// ANALYTICS — single chart with dropdown selector
// ============================================================
function CH(){
  const entries=S.entries||[];const stats=S.stats||{};const hist=makeScoreHistory(entries.slice(0,6));
  const totalScore=Math.round(entries.reduce((sum,e)=>sum+e.total,0)*10)/10;
  const leader=entries[0];const last=entries[entries.length-1];
  const leaderGap=leader&&last?Math.round((leader.total-last.total)*10)/10:0;
  const totalPucks=(stats.totalPucks||entries.reduce((s,e)=>s+(e.pkU||0),0));
  const alivePucks=entries.reduce((s,e)=>s+(e.pkR||0),0);
  const ptsPerPuck=totalPucks?Math.round(totalScore/totalPucks*100)/100:0;
  const wildcardScore=Math.round(entries.reduce((s,e)=>s+e.players.filter(p=>p.mult===2).reduce((a,p)=>a+p.score,0),0)*10)/10;
  const ppp = entries.slice().map(e=>({name:e.teamName,val:e.pkU?Math.round(e.total/e.pkU*100)/100:0})).sort((a,b)=>b.val-a.val);
  const owned=(stats.pl||[]).slice().sort((a,b)=>b.own-a.own||b.as-a.as).slice(0,10);
  return `<div class="space-y-4">
    <div class="flex items-start justify-between gap-4 flex-wrap">
      <div><div class="text-[11px] tracking-[0.18em] uppercase text-emerald-500 font-bold">§02</div><h2 class="text-3xl font-extrabold tracking-tight" style="font-family:Georgia,serif;color:var(--text)">Analytics</h2></div>
      <div class="text-sm" style="color:var(--muted)">Pool-wide KPIs, where the chalk is, who's trending.</div>
    </div>
    <div class="analytics-kpis">
      <div class="analytics-kpi"><div class="stat-label">Pool Total</div><div class="analytics-kpi-value num">${fmt(totalScore)} <span style="font-size:16px;color:var(--muted)">pts</span></div><div class="analytics-kpi-sub">avg ${entries.length?fmt(totalScore/entries.length):0} per entry</div></div>
      <div class="analytics-kpi"><div class="stat-label">Leader → Last</div><div class="analytics-kpi-value num">${fmt(leaderGap)} <span style="font-size:16px;color:var(--muted)">pts</span></div><div class="analytics-kpi-sub">${esc(leader?.teamName||'Leader')} on top</div></div>
      <div class="analytics-kpi"><div class="stat-label">Pucks Alive</div><div class="analytics-kpi-value num">${alivePucks}<span style="font-size:16px;color:var(--muted)"> / ${totalPucks}</span></div><div class="analytics-kpi-sub">${totalPucks?Math.round(alivePucks/totalPucks*100):0}% of the pool still playing</div></div>
      <div class="analytics-kpi"><div class="stat-label">Pts / Puck</div><div class="analytics-kpi-value num">${ptsPerPuck}</div><div class="analytics-kpi-sub">pool-wide efficiency</div></div>
      <div class="analytics-kpi"><div class="stat-label">Wildcard Share</div><div class="analytics-kpi-value num">${totalScore?Math.round(wildcardScore/totalScore*100):0}<span style="font-size:16px;color:var(--muted)">%</span></div><div class="analytics-kpi-sub">${fmt(wildcardScore)} pts from 2.0× picks</div></div>
    </div>
    <div class="dashboard-grid">
      <div class="dash-card"><div class="dash-head"><div class="dash-title">Score Contribution · by Entry</div><div class="dash-sub">stacked by multiplier tier</div></div><div class="chart-wrap"><canvas id="dashContrib"></canvas></div></div>
      <div class="dash-card"><div class="dash-head"><div class="dash-title">Points per Puck</div><div class="dash-sub">efficiency · leader in green</div></div><div class="ppp-list">${ppp.map((r,i)=>`<div class="ppp-row"><div class="ppp-name">${esc(r.name)}</div><div class="meter"><div class="meter-fill ${i===0?'':'alt'}" style="width:${ppp[0]?.val?Math.max(8,(r.val/ppp[0].val)*100):0}%"></div></div><div class="ppp-val num">${r.val}</div></div>`).join('')}</div></div>
    </div>
    <div class="dash-card"><div class="dash-head"><div class="dash-title">Score Over Time</div><div class="dash-sub">last 10 days · top 6 entries</div></div><div class="chart-wrap-lg"><canvas id="dashTrend"></canvas></div></div>
    <div class="dashboard-grid-2">
      <div class="dash-card"><div class="dash-head"><div class="dash-title">Most-Owned Skaters</div><div class="dash-sub">ownership % across ${entries.length} entries</div></div><div class="owned-list">${owned.map(p=>`<div class="owned-row"><div class="owned-name">${esc(p.name)} <span>${esc(p.team)}</span></div><div class="meter"><div class="meter-fill ${p.own===100?'':'alt'}" style="width:${p.own}%"></div></div><div class="owned-pct num">${p.own}%</div></div>`).join('')}</div></div>
      <div class="dash-card"><div class="dash-head"><div class="dash-title">Alive vs Eliminated</div><div class="dash-sub">score contribution · what's still in play</div></div><div class="chart-wrap-sm"><canvas id="dashAlive"></canvas></div></div>
    </div>
  </div>`;
}

function drawChart(){
  if(S.tab!=='chart')return;
  const entries=S.entries||[]; if(!entries.length)return;
  const tx={color:getComputedStyle(document.body).getPropertyValue('--muted').trim()||'#94a3b8',font:{family:'Inter',size:10}};
  const axisColor=getComputedStyle(document.body).getPropertyValue('--line').trim()||'#e5e7eb';
  const grid={color:axisColor};
  const tooltipBg=S.theme==='dark'?'#0f1729':'#14213d';
  const labelMap=entries.map(e=>e.teamName.length>15?e.teamName.slice(0,15)+'…':e.teamName);
  const mk=(el,cfg)=>{if(!el)return;const ch=new Chart(el,cfg);S._charts.push(ch);};
  const contrib=document.getElementById('dashContrib');
  if(contrib){
    const fav=entries.map(e=>Math.round(e.players.filter(p=>p.mult===1).reduce((s,p)=>s+p.score,0)*10)/10);
    const mid=entries.map(e=>Math.round(e.players.filter(p=>p.mult===1.5).reduce((s,p)=>s+p.score,0)*10)/10);
    const wc=entries.map(e=>Math.round(e.players.filter(p=>p.mult===2).reduce((s,p)=>s+p.score,0)*10)/10);

function SM(){
  const c=S.simCfg;
  const si=(l,v,k)=>`<div><label class="text-[10px] text-slate-400">${l}</label><input type="number" value="${v}" onchange="updSim('${k}',this.value)" step="any" class="w-full mt-0.5 bg-white border border-slate-200 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-amber-400"></div>`;
  const stg=S.showSim?`<div class="card p-3"><div class="grid grid-cols-2 sm:grid-cols-5 gap-2">${si('Sims',c.n,'n')}${si('Var',c.v,'v')}${si('Fav',c.adv[1],'a1')}${si('Mid',c.adv[1.5],'a15')}${si('WC',c.adv[2],'a2')}</div></div>`:'';
  let res='';
  if(!S.simRes&&!S.simRun)res=`<div class="card p-8 text-center text-slate-400 text-xs">Click Run to project outcomes</div>`;
  else if(S.simRes){const pr=S.simRes;
    res=`<div class="card p-3"><h3 class="text-xs font-semibold text-slate-700 mb-2">Win Probability</h3>${pr.slice().sort((a,b)=>b.wp-a.wp).map((p,i)=>`<div class="flex items-center gap-2 mb-1"><div class="w-24 sm:w-36 text-[10px] text-slate-500 truncate text-right flex-shrink-0">${esc(p.tn)}</div><div class="flex-1 bar-bg h-4"><div class="bar-f h-4" style="width:${Math.max(p.wp,1)}%;background:${i===0?'#d4a843':'#0f1729'}">${p.wp>=10?`<span class="text-[9px] font-bold text-white">${p.wp}%</span>`:''}</div></div>${p.wp<10?`<span class="text-[10px] text-slate-400 w-8 text-right num">${p.wp}%</span>`:''}</div>`).join('')}</div>
    <div class="card"><div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="bg-slate-50 border-b border-slate-200"><th class="text-left text-[9px] font-semibold text-slate-400 uppercase px-2 sm:px-3 py-1.5">Team</th><th class="text-right text-[9px] font-semibold text-slate-400 uppercase px-1 py-1.5">Now</th><th class="text-right text-[9px] font-semibold text-slate-400 uppercase px-1 py-1.5">Mean</th><th class="text-right text-[9px] font-semibold text-slate-400 uppercase px-1 py-1.5">10th</th><th class="text-right text-[9px] font-semibold text-slate-400 uppercase px-1 py-1.5">90th</th><th class="text-right text-[9px] font-semibold text-slate-400 uppercase px-2 sm:px-3 py-1.5">Win%</th></tr></thead><tbody>${pr.map(p=>`<tr class="border-b border-slate-50 trow"><td class="px-2 sm:px-3 py-1.5 font-medium text-slate-900">${esc(p.tn)}</td><td class="px-1 py-1.5 text-right text-slate-400 num">${fmt(p.cur)}</td><td class="px-1 py-1.5 text-right font-bold text-slate-900 num">${fmt(p.mn)}</td><td class="px-1 py-1.5 text-right text-red-400 num">${fmt(p.p10)}</td><td class="px-1 py-1.5 text-right text-emerald-600 num">${fmt(p.p90)}</td><td class="px-2 sm:px-3 py-1.5 text-right font-bold num ${p.wp>=25?'text-amber-600':p.wp>=10?'text-slate-700':'text-slate-400'}">${p.wp}%</td></tr>`).join('')}</tbody></table></div></div>`;}
  return`<div class="space-y-3"><div class="flex items-center justify-between"><div><div class="text-sm font-semibold text-slate-900">Projections</div><div class="text-[10px] text-slate-400">Monte Carlo simulation</div></div><div class="flex gap-1.5"><button onclick="set({showSim:!S.showSim})" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-[10px] font-medium text-slate-600">⚙</button><button onclick="doSim()" ${S.simRun?'disabled':''} class="px-3 py-1 rounded text-[10px] font-semibold text-white" style="background:${S.simRun?'#94a3b8':'#0f1729'}">${S.simRun?'Running...':'▶ Run'}</button></div></div>${stg}${res}</div>`;
}

    <div class="card p-3"><div class="flex gap-3">${pay.map(p=>`<div class="text-center"><div class="w-7 h-7 mx-auto rounded-full flex items-center justify-center text-[9px] font-bold mb-0.5 ${p.p===1?'r1':p.p===2?'r2':'r3'}">${p.l}</div><div class="font-bold text-slate-900 text-xs num">$${p.a}</div></div>`).join('')}</div></div>
    <div class="card p-3"><div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">${S.entries.map(e=>`<div class="flex items-center justify-between p-2 bg-slate-50 rounded text-xs"><div><span class="font-medium text-slate-900">${esc(e.teamName)}</span> <span class="text-slate-400">${esc(e.owner)}</span></div><div class="font-bold text-slate-900 num">${fmt(e.total)} <span class="text-slate-400 font-normal">#${e.rank}</span></div></div>`).join('')}</div></div>

let EF={name:'',owner:'',fwd:Array.from({length:10},()=>({p:'',pk:1})),def:Array.from({length:5},()=>({p:'',pk:1})),submitted:false};
// Clear any old localStorage data on page load
try{localStorage.removeItem('50pucks_entry');}catch{}
function saveEF(){try{localStorage.setItem('50pucks_entry',JSON.stringify(EF));}catch{}}

function efPkTotal(){return EF.fwd.reduce((s,x)=>s+(parseInt(x.pk)||0),0)+EF.def.reduce((s,x)=>s+(parseInt(x.pk)||0),0);}
function efValid(){
  if(!EF.name.trim()||!EF.owner.trim())return{ok:false,msg:'Enter your team name and your name.'};
  const fwdFilled=EF.fwd.filter(x=>x.p).length;const defFilled=EF.def.filter(x=>x.p).length;
  if(fwdFilled<10)return{ok:false,msg:`Select ${10-fwdFilled} more forward${10-fwdFilled>1?'s':''}.`};
  if(defFilled<5)return{ok:false,msg:`Select ${5-defFilled} more defensem${5-defFilled>1?'en':'an'}.`};
  const t=efPkTotal();if(t!==50)return{ok:false,msg:`Pucks total is ${t}. Must be exactly 50.`};
  // Check duplicates
  const all=[...EF.fwd.map(x=>x.p),...EF.def.map(x=>x.p)].filter(Boolean);
  const dups=all.filter((v,i)=>all.indexOf(v)!==i);
  if(dups.length)return{ok:false,msg:`Duplicate player: ${dups[0]}`};
  return{ok:true,msg:'Ready to submit!'};
}

function efBuildRows(){
  const rows=[];
  [...EF.fwd,...EF.def].forEach((x,i)=>{
    if(!x.p)return;
    const parts=x.p.split(' – ');
    rows.push({team_name:EF.name,owner_name:EF.owner,player_name:parts[0],player_team:parts[1]||'',position:i<10?'F':'D',pucks:x.pk});
  });
  return rows;
}

async function efSubmit(){
  const v=efValid();if(!v.ok)return;
  const rows=efBuildRows();
  if(!APPS_SCRIPT_URL){efMailtoFallback();return;}

  EF._status='sending';saveEF();render();

  try{
    // Hidden iframe form POST — bypasses CORS entirely, no preflight, GAS receives it reliably
    let iframe=document.getElementById('_gas_iframe');
    if(!iframe){
      iframe=document.createElement('iframe');
      iframe.name='_gas_iframe';
      iframe.id='_gas_iframe';
      iframe.style.display='none';
      document.body.appendChild(iframe);
    }
    const form=document.createElement('form');
    form.method='POST';
    form.action=APPS_SCRIPT_URL;
    form.target='_gas_iframe';
    const inp=document.createElement('input');
    inp.type='hidden';inp.name='data';
    inp.value=JSON.stringify({rows});
    form.appendChild(inp);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // GAS processes in background — wait 2s then show success
    await new Promise(r=>setTimeout(r,2000));
    EF.submitted=true;EF._status='sent';saveEF();render();
    setTimeout(()=>{EF.submitted=false;render();},3000);
  }catch(err){
    console.error('Submit error:',err);
    EF._status='error';saveEF();render();
  }
}

function efMailtoFallback(){
  const lines=[];
  lines.push(`50 PUCKS ENTRY — ${S.yr}`);
  lines.push(`Team: ${EF.name}`);
  lines.push(`Owner: ${EF.owner}`);
  lines.push('');
  lines.push('FORWARDS:');
  EF.fwd.forEach((x,i)=>{if(x.p)lines.push(`  ${i+1}. ${x.p} — ${x.pk} pucks`);});
  lines.push('');
  lines.push('DEFENSE:');
  EF.def.forEach((x,i)=>{if(x.p)lines.push(`  ${i+1}. ${x.p} — ${x.pk} pucks`);});
  lines.push('');
  lines.push(`Total Pucks: ${efPkTotal()}/50`);
  lines.push('');
  lines.push('--- CSV (for upload) ---');
  efBuildRows().forEach(r=>lines.push(`${r.team_name},${r.owner_name},${r.player_name},${r.player_team},${r.position},${r.pucks}`));
  const body=encodeURIComponent(lines.join('\n'));
  const subj=encodeURIComponent(`50 Pucks Entry: ${EF.name}`);
  window.location.href=`mailto:${POOL_EMAIL}?subject=${subj}&body=${body}`;
}

function efUpdate(type,idx,field,val){
  if(type==='name')EF.name=val;
  else if(type==='owner')EF.owner=val;
  else if(type==='fwd'){EF.fwd=EF.fwd.map((x,i)=>i===idx?{...x,[field]:val}:x);}
  else if(type==='def'){EF.def=EF.def.map((x,i)=>i===idx?{...x,[field]:val}:x);}
  saveEF();render();
}

      <div class="flex justify-between items-center px-3 py-1.5 bg-slate-50 border-b border-slate-200">
        <span class="text-[9px] font-semibold text-slate-400 uppercase tracking-wider">Forwards (10)</span>
        <span class="text-[10px] text-slate-500">${EF.fwd.filter(x=>x.p).length}/10 selected</span>
      </div>
      <div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-slate-100"><th class="text-center text-[9px] text-slate-400 uppercase px-2 py-1 w-8">#</th><th class="text-left text-[9px] text-slate-400 uppercase px-1 py-1">Player</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1 w-14">Pucks</th></tr></thead><tbody>${fwdRows}</tbody></table></div>
    </div>

    <div class="card">
      <div class="flex justify-between items-center px-3 py-1.5 bg-slate-50 border-b border-slate-200">
        <span class="text-[9px] font-semibold text-slate-400 uppercase tracking-wider">Defense (5)</span>
        <span class="text-[10px] text-slate-500">${EF.def.filter(x=>x.p).length}/5 selected</span>
      </div>
      <div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-slate-100"><th class="text-center text-[9px] text-slate-400 uppercase px-2 py-1 w-8">#</th><th class="text-left text-[9px] text-slate-400 uppercase px-1 py-1">Player</th><th class="text-center text-[9px] text-slate-400 uppercase px-1 py-1 w-14">Pucks</th></tr></thead><tbody>${defRows}</tbody></table></div>
    </div>

    <div class="card p-3">
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm font-semibold text-slate-900">Puck Allocation</div>
        <div class="text-lg font-bold num ${t===50?'text-emerald-600':t>50?'text-red-500':'text-amber-500'}">${t}<span class="text-slate-300 text-sm font-normal">/50</span></div>
      </div>
      <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all" style="width:${Math.min(t/50*100,100)}%;background:${t===50?'#10b981':t>50?'#ef4444':'#d4a843'}"></div>
      </div>
      <div class="mt-2 text-xs ${v.ok?'text-emerald-600':'text-amber-600'}">${v.msg}</div>
    </div>

    <div class="flex gap-2">
      ${EF.submitted?`
        <div class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded text-sm font-semibold text-white bg-emerald-600">
          ✓ Entry Submitted
        </div>
      `:EF._status==='sending'?`
        <div class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded text-sm font-semibold text-white bg-slate-400">
          Submitting...
        </div>
      `:EF._status==='error'?`
        <button onclick="efMailtoFallback()" class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded text-sm font-semibold text-white bg-amber-600">
          ✉ Submit via Email (fallback)
        </button>
      `:`
        <button onclick="efSubmit()" ${v.ok?'':'disabled'} class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded text-sm font-semibold text-white ${v.ok?'cursor-pointer':'opacity-40 cursor-not-allowed'}" style="background:#0f1729">
          Submit Entry
        </button>
      `}
    </div>
    ${EF.submitted?'<p class="text-[10px] text-emerald-600 text-center font-medium">Your entry has been received. Good luck!</p>':EF._status==='error'?'<p class="text-[10px] text-amber-600 text-center">Auto-submit failed. Click above to send via email instead.</p>':v.ok?'<p class="text-[10px] text-slate-400 text-center">Your entry will be sent directly to the pool host.</p>':''}

    <div class="card p-3">
      <div class="text-[10px] text-slate-500 font-medium mb-1">RULES</div>
      <div class="text-[10px] text-slate-400 space-y-0.5">
        <div>• 10 forwards + 5 defense from playoff teams only</div>
        <div>• Allocate exactly 50 pucks total (1–6 per player)</div>
        <div>• Score = Playoff Points × Pucks × Team Multiplier</div>
        <div>• $${sn().fee} ${CFG.cur} entry fee via e-transfer</div>
      </div>
    </div>
  </div>`;
}

// BOOT
function initApp(){
  loadPersistedRoster();
  const entriesLoaded=loadPersistedEntries();
  const statsLoaded=loadPersistedStats();
  if(!entriesLoaded||!statsLoaded){
    loadData();
  }else{
    // Both loaded from localStorage — recalculate scores before rendering
    if(S._nhlStats&&S._nhlStats.length>0&&S.entries&&S.entries.length>0){
      const lu=buildLU(S._nhlStats);
      const sc=calcScores(S.entries,lu);
      const ps=poolStats(sc);
      S.entries=sc;S.stats=ps;S.sel=sc[0]?.teamName||null;
    }
    S.loading=false;
    document.getElementById('loader').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initApp);}else{initApp();}
</script>

</body>
</html>
